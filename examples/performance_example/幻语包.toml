[package]
name = "performance-example"
version = "0.3.0"
edition = "1.2"
authors = ["Performance Team <perf@example.com>"]
description = "性能优化和调试示例项目"
license = "MIT"

[dependencies]
# 性能监控依赖（实际项目中需要添加）
# huanlang-profiler = "1.0"
# huanlang-metrics = "1.0"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true

[profile.dev]
opt-level = 0
debug = true

[profile.bench]
opt-level = 3
lto = true
